<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Premium Award</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .header { text-align: center; margin-top: 40px; }
        .header p { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #86868b; margin-bottom: 4px; }
        h1 { font-size: 32px; font-weight: 800; margin: 0; color: #1d1d1f; letter-spacing: -1px; }
        #canvas-container { width: 100%; height: 400px; cursor: grab; }
        .footer-text { color: #ff3b30; font-weight: 700; font-size: 18px; margin-top: 20px; }
        .objectives { margin-top: 30px; width: 90%; max-width: 400px; background: #f5f5f7; border-radius: 24px; padding: 20px; display: flex; justify-content: space-around; }
        .slot { width: 80px; height: 80px; background: #e8e8ed; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #a1a1a6; }
    </style>
</head>
<body>

    <div class="header">
        <p>AI CÂȘTIGAT:</p>
        <h1>Madrid pentru începători</h1>
    </div>

    <div id="canvas-container"></div>

    <p class="footer-text">Colecționează-le pe toate!</p>

    <div class="objectives">
        <div class="slot">🔒</div>
        <div class="slot">🔒</div>
        <div class="slot">🔒</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- Premium Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);

        const trophyGroup = new THREE.Group();
        scene.add(trophyGroup);

        // --- Creating the 3D Medal Body ---
        // This uses a thicker geometry for that physical "coin" look
        const bodyGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.2, 64);
        const silverMat = new THREE.MeshStandardMaterial({ 
            color: 0xd2d2d7, 
            metalness: 0.9, 
            roughness: 0.1 
        });
        const body = new THREE.Mesh(bodyGeo, silverMat);
        body.rotation.x = Math.PI / 2;
        trophyGroup.add(body);

        // --- Detailed Madrid Emblem (Oso y el Madroño) ---
        // Using a Shape to create a real 3D extrusion of the icon
        const shape = new THREE.Shape();
        // Simplified Bear & Tree silhouette
        shape.moveTo(-0.2, -0.6); shape.lineTo(0.2, -0.6); shape.lineTo(0.2, 0); 
        shape.lineTo(0.5, 0); shape.bezierCurveTo(0.7, 0.5, 0.3, 0.8, 0, 0.8);
        shape.bezierCurveTo(-0.3, 0.8, -0.7, 0.5, -0.5, 0); shape.lineTo(-0.2, 0);

        const extrudeSettings = { depth: 0.1, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02 };
        const iconGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        const iconMat = new THREE.MeshStandardMaterial({ color: 0xff3b30, metalness: 0.5, roughness: 0.2 });
        const icon = new THREE.Mesh(iconGeo, iconMat);
        icon.position.set(0, 0, 0.1);
        trophyGroup.add(icon);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;

        function animate() {
            requestAnimationFrame(animate);
            trophyGroup.rotation.y += 0.005; // Subtle auto-rotation
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
