<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Trophy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --accent: #ff3b30;
            --silver-grad: linear-gradient(145deg, #e6e6e7, #ffffff);
            --shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Styling */
        .header {
            text-align: center;
            margin-top: 60px;
            padding: 0 20px;
        }

        .header p {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #86868b;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        /* 3D Container */
        #canvas-container {
            width: 100%;
            height: 450px;
            cursor: grab;
            position: relative;
            margin: 20px 0;
        }

        /* Interaction Hint */
        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #a1a1a6;
            background: rgba(245, 245, 247, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .subtitle {
            font-size: 18px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 50px;
        }

        /* Collection Section */
        .collection-card {
            width: 90%;
            max-width: 450px;
            background: #fbfbfd;
            border-radius: 32px;
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 80px;
        }

        .collection-card h3 {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 25px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .locked-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.25;
        }

        .circle-slot {
            width: 65px;
            height: 65px;
            border-radius: 22px;
            background: #e5e5e7;
            border: 2px dashed #d2d2d7;
        }

    </style>
</head>
<body>

    <div class="header">
        <p>Ai câștigat:</p>
        <h1>Madrid pentru începători</h1>
    </div>
    
    <div id="canvas-container">
        <div id="hint">⟷ Rotește emblema</div>
    </div>

    <p class="subtitle">Colecționează-le pe toate!</p>

    <div class="collection-card">
        <h3>URMĂTOARELE OBIECTIVE</h3>
        <div class="grid">
            <div class="locked-slot"><div class="circle-slot"></div></div>
            <div class="locked-slot"><div class="circle-slot"></div></div>
            <div class="locked-slot"><div class="circle-slot"></div></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const hint = document.getElementById('hint');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Studio Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const light1 = new THREE.PointLight(0xffffff, 1);
        light1.position.set(5, 5, 5);
        scene.add(light1);

        const light2 = new THREE.PointLight(0xffffff, 0.5);
        light2.position.set(-5, -5, 2);
        scene.add(light2);

        // Group to hold the trophy parts
        const trophy = new THREE.Group();
        scene.add(trophy);

        // 1. The Coin Body (Beveled look)
        const geometry = new THREE.CylinderGeometry(1.8, 1.8, 0.25, 64);
        const silverMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xf0f0f2,
            metalness: 0.8,
            roughness: 0.15,
            emissive: 0x111111
        });
        const mesh = new THREE.Mesh(geometry, silverMaterial);
        mesh.rotation.x = Math.PI / 2;
        trophy.add(mesh);

        // 2. The Madrid Emblem (Front)
        // Creating a canvas to draw the Madrid Bear & Tree precisely
        const emblemCanvas = document.createElement('canvas');
        const ctx = emblemCanvas.getContext('2d');
        emblemCanvas.width = 1024;
        emblemCanvas.height = 1024;

        function drawEmblem() {
            ctx.clearRect(0, 0, 1024, 1024);
            ctx.strokeStyle = "#ff3b30"; // Madrid Red
            ctx.lineWidth = 25;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            // Draw Tree (Simplified artistic version)
            ctx.beginPath();
            ctx.moveTo(512, 800);
            ctx.lineTo(512, 450);
            // Leaves
            ctx.moveTo(512, 450);
            ctx.bezierCurveTo(350, 450, 350, 200, 512, 200);
            ctx.bezierCurveTo(674, 200, 674, 450, 512, 450);
            ctx.stroke();

            // Draw Bear
            ctx.beginPath();
            ctx.moveTo(650, 800);
            ctx.lineTo(580, 800);
            ctx.lineTo(580, 550); // Leaning on tree
            ctx.lineTo(650, 550);
            ctx.bezierCurveTo(750, 550, 750, 800, 650, 800);
            ctx.stroke();
        }
        drawEmblem();

        const emblemTex = new THREE.CanvasTexture(emblemCanvas);
        const faceGeo = new THREE.CircleGeometry(1.65, 64);
        const faceMat = new THREE.MeshStandardMaterial({ 
            map: emblemTex, 
            transparent: true,
            metalness: 0.3,
            roughness: 0.5
        });

        const frontFace = new THREE.Mesh(faceGeo, faceMat);
        frontFace.position.z = 0.126;
        trophy.add(frontFace);

        // 3. The Back Side ("FOREVER")
        const backCanvas = document.createElement('canvas');
        const bCtx = backCanvas.getContext('2d');
        backCanvas.width = 1024;
        backCanvas.height = 1024;
        bCtx.fillStyle = "#f0f0f2";
        bCtx.fillRect(0,0,1024,1024);
        bCtx.font = "bold 140px 'Plus Jakarta Sans'";
        bCtx.fillStyle = "#8e8e93";
        bCtx.textAlign = "center";
        bCtx.textBaseline = "middle";
        bCtx.fillText("FOREVER", 512, 512);

        const backTex = new THREE.CanvasTexture(backCanvas);
        const backFace = new THREE.Mesh(faceGeo, new THREE.MeshStandardMaterial({ map: backTex }));
        backFace.position.z = -0.126;
        backFace.rotation.y = Math.PI;
        trophy.add(backFace);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;
        
        // Disable auto-rotate as requested
        controls.autoRotate = false;

        // Hide hint on interaction
        controls.addEventListener('start', () => {
            hint.style.opacity = '0';
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    </script>
</body>
</html>
