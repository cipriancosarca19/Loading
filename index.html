<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Trophy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --accent: #ff3b30;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .header { text-align: center; margin-top: 50px; padding: 0 20px; }
        .header p { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #86868b; margin-bottom: 5px; }
        h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        #canvas-container {
            width: 100%;
            height: 450px;
            cursor: grab;
            position: relative;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #a1a1a6;
            background: rgba(245, 245, 247, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
        }

        .subtitle { font-size: 18px; color: var(--accent); font-weight: 700; margin-top: 10px; }

        .collection-card {
            width: 88%;
            max-width: 420px;
            background: #fbfbfd;
            border-radius: 32px;
            padding: 30px;
            margin-top: 30px;
            margin-bottom: 60px;
            border: 1px solid #efeff4;
            text-align: center;
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .circle-slot { 
            width: 100%; aspect-ratio: 1; border-radius: 24px; 
            background: #f2f2f7; border: 1px solid #e5e5ea; 
            display: flex; align-items: center; justify-content: center; 
            opacity: 0.4; font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header">
        <p>Ai câștigat:</p>
        <h1>Madrid pentru începători</h1>
    </div>
    
    <div id="canvas-container">
        <div id="hint">Atinge pentru a roti 3D</div>
    </div>

    <p class="subtitle">Colecționează-le pe toate!</p>

    <div class="collection-card">
        <div class="grid">
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Studio Lighting
        const amb = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(amb);
        const point = new THREE.PointLight(0xffffff, 1);
        point.position.set(5, 5, 5);
        scene.add(point);

        const trophy = new THREE.Group();
        scene.add(trophy);

        // --- THE COIN BODY ---
        const bodyGeo = new THREE.CylinderGeometry(1.9, 1.9, 0.25, 64);
        const bodyMat = new THREE.MeshStandardMaterial({ 
            color: 0xbdbdbd, 
            metalness: 0.9, 
            roughness: 0.3 
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.x = Math.PI / 2;
        trophy.add(body);

        // --- FRONT FACE: MADRID EMBLEM ---
        const loader = new THREE.TextureLoader();
        // High quality Madrid Emblem (Bear & Tree)
        const emblemUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Escudo_de_Madrid.svg/512px-Escudo_de_Madrid.svg.png";
        
        loader.load(emblemUrl, (tex) => {
            const faceGeo = new THREE.CircleGeometry(1.75, 64);
            const faceMat = new THREE.MeshStandardMaterial({ 
                map: tex, 
                transparent: true,
                metalness: 0.1,
                roughness: 0.5
            });
            const front = new THREE.Mesh(faceGeo, faceMat);
            front.position.z = 0.126;
            trophy.add(front);
        });

        // --- BACK FACE: FOREVER ---
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1024; canvas.height = 1024;
        ctx.fillStyle = "#b0b0b0"; 
        ctx.fillRect(0,0,1024,1024);
        
        // Engraved Look
        ctx.font = "bold 100px 'Plus Jakarta Sans'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(0,0,0,0.3)"; // Shadow
        ctx.fillText("FOREVER", 516, 516);
        ctx.fillStyle = "#333333"; // Main Text
        ctx.fillText("FOREVER", 512, 512);

        const backTex = new THREE.CanvasTexture(canvas);
        const backFace = new THREE.Mesh(
            new THREE.CircleGeometry(1.75, 64), 
            new THREE.MeshStandardMaterial({ map: backTex, metalness: 0.5, roughness: 0.4 })
        );
        backFace.position.z = -0.126;
        backFace.rotation.y = Math.PI;
        trophy.add(backFace);

        // Interaction
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;
        
        const hint = document.getElementById('hint');
        controls.addEventListener('start', () => hint.style.opacity = '0');

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
