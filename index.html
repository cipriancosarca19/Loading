<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Trophy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header p { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #86868b; margin-bottom: 5px; }
        h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        /* The Medal Container */
        .medal-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Realistic Medal Background */
        .medal-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5f5f7 0%, #d2d2d7 100%);
            border-radius: 50%;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.1),
                inset 0 -5px 15px rgba(0,0,0,0.05),
                inset 0 5px 15px rgba(255,255,255,0.8);
            border: 8px solid #ffffff;
        }

        /* The Actual Madrid Photo from the Internet */
        .medal-image {
            position: relative;
            width: 70%;
            height: 70%;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            z-index: 2;
        }

        .subtitle { font-size: 18px; color: #ff3b30; font-weight: 700; margin-bottom: 30px; }

        /* Objectives Section */
        .objectives {
            display: flex;
            gap: 15px;
            background: #f5f5f7;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid #efeff4;
        }

        .slot {
            width: 70px;
            height: 70px;
            background: #e8e8ed;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <p>AI CÂȘTIGAT:</p>
        <h1>Madrid pentru începători</h1>
    </div>

    <div class="medal-container">
        <div class="medal-base"></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Escudo_de_Madrid.svg/1200px-Escudo_de_Madrid.svg.png" 
             alt="Madrid Emblem" class="medal-image">
    </div>

    <p class="subtitle">Colecționează-le pe toate!</p>

    <div class="objectives">
        <div class="slot">🔒</div>
        <div class="slot">🔒</div>
        <div class="slot">🔒</div>
    </div>

</body>
</html>
