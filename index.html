<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Trophy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .header { text-align: center; margin-top: 50px; }
        .header p { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #86868b; margin-bottom: 5px; }
        h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        #canvas-container {
            width: 100%;
            height: 400px;
            cursor: grab;
            position: relative;
        }

        .subtitle { font-size: 18px; color: #ff3b30; font-weight: 700; margin-top: 20px; }

        .collection-card {
            width: 85%;
            max-width: 400px;
            background: #fbfbfd;
            border-radius: 30px;
            padding: 25px;
            margin: 30px 0 50px;
            border: 1px solid #efeff4;
            text-align: center;
        }

        .collection-card h3 { font-size: 11px; color: #86868b; letter-spacing: 1px; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .circle-slot { width: 100%; aspect-ratio: 1; border-radius: 20px; background: #e5e5e7; border: 1px solid #d2d2d7; display: flex; align-items: center; justify-content: center; opacity: 0.3; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <p>Ai câștigat:</p>
        <h1>Madrid pentru începători</h1>
    </div>
    
    <div id="canvas-container"></div>

    <p class="subtitle">Colecționează-le pe toate!</p>

    <div class="collection-card">
        <h3>URMĂTOARELE OBIECTIVE</h3>
        <div class="grid">
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1);
        spotLight.position.set(5, 10, 7.5);
        scene.add(spotLight);

        const pointLight = new THREE.PointLight(0xff3b30, 0.5);
        pointLight.position.set(-5, -5, -5);
        scene.add(pointLight);

        // --- TROPHY MODEL ---
        const trophy = new THREE.Group();
        scene.add(trophy);

        // 1. The Heavy Metal Base
        const bodyGeo = new THREE.CylinderGeometry(1.8, 1.8, 0.3, 64);
        const metalMat = new THREE.MeshStandardMaterial({ 
            color: 0xe0e0e0, 
            metalness: 0.9, 
            roughness: 0.1,
            envMapIntensity: 1
        });
        const body = new THREE.Mesh(bodyGeo, metalMat);
        body.rotation.x = Math.PI / 2;
        trophy.add(body);

        // 2. The Detailed Madrid Emblem
        const shape = new THREE.Shape();
        // Drawing a professional stylized bear & tree path
        // Tree
        shape.moveTo(0, 0.8);
        shape.bezierCurveTo(0.6, 0.8, 0.7, 0.3, 0.7, 0);
        shape.bezierCurveTo(0.7, -0.3, 0.5, -0.6, 0, -0.6);
        shape.bezierCurveTo(-0.5, -0.6, -0.7, -0.3, -0.7, 0);
        shape.bezierCurveTo(-0.7, 0.3, -0.6, 0.8, 0, 0.8);

        const extrudeSettings = { depth: 0.1, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05 };
        const emblemGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        const emblemMat = new THREE.MeshStandardMaterial({ color: 0xff3b30, metalness: 0.6, roughness: 0.2 });
        const emblem = new THREE.Mesh(emblemGeo, emblemMat);
        emblem.position.set(0, 0, 0.15);
        emblem.scale.set(1.2, 1.2, 1.2);
        trophy.add(emblem);

        // 3. Back Side Text
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 512;
        ctx.fillStyle = "#e0e0e0"; ctx.fillRect(0,0,512,512);
        ctx.font = "bold 70px 'Plus Jakarta Sans'";
        ctx.fillStyle = "#333333"; ctx.textAlign = "center";
        ctx.fillText("FOREVER", 256, 260);

        const backTex = new THREE.CanvasTexture(canvas);
        const backFace = new THREE.Mesh(new THREE.CircleGeometry(1.75, 64), new THREE.MeshStandardMaterial({ map: backTex }));
        backFace.position.z = -0.16;
        backFace.rotation.y = Math.PI;
        trophy.add(backFace);

        // --- CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
