<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Trophy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --accent: #ff3b30;
            --silver: #f5f5f7;
            --shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .header { text-align: center; margin-top: 60px; padding: 0 20px; }
        .header p { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #86868b; margin-bottom: 8px; }
        h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -1px; line-height: 1.1; }

        #canvas-container {
            width: 100%;
            height: 450px;
            cursor: grab;
            position: relative;
            margin: 10px 0;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #a1a1a6;
            background: rgba(245, 245, 247, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .subtitle { font-size: 18px; color: var(--accent); font-weight: 700; margin-bottom: 40px; }

        .collection-card {
            width: 85%;
            max-width: 400px;
            background: #fbfbfd;
            border-radius: 30px;
            padding: 25px;
            box-shadow: var(--shadow);
            margin-bottom: 60px;
            border: 1px solid #efeff4;
            text-align: center;
        }

        .collection-card h3 { font-size: 11px; color: #86868b; letter-spacing: 1px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .circle-slot { width: 100%; aspect-ratio: 1; border-radius: 20px; background: #e5e5e7; border: 2px dashed #d2d2d7; display: flex; align-items: center; justify-content: center; opacity: 0.3; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <p>Ai câștigat:</p>
        <h1>Madrid pentru începători</h1>
    </div>
    
    <div id="canvas-container">
        <div id="hint">⟷ Rotește trofeul</div>
    </div>

    <p class="subtitle">Colecționează-le pe toate!</p>

    <div class="collection-card">
        <h3>URMĂTOARELE OBIECTIVE</h3>
        <div class="grid">
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const hint = document.getElementById('hint');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const trophy = new THREE.Group();
        scene.add(trophy);

        // Body of the medal
        const bodyGeo = new THREE.CylinderGeometry(1.8, 1.8, 0.25, 64);
        const silverMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f2, metalness: 0.7, roughness: 0.2 });
        const body = new THREE.Mesh(bodyGeo, silverMat);
        body.rotation.x = Math.PI / 2;
        trophy.add(body);

        // MADRID EMBEM (Embedded Base64 - No External Loading)
        const loader = new THREE.TextureLoader();
        // This is a high-quality stylized emblem of the Madrid Bear and Tree
        const emblemData = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik01MCAxNWMtMTUgMC0yMCAxMC0yMCAyNXM1IDI1IDIwIDI1czIwLTEwIDIwLTI1LTUtMjUtMjAtMjV6IiBmaWxsPSIjRTM0MjM0Ii8+PHBhdGggZD0iTTQ4IDQwdjQ1aDRWNDBoLTR6IiBmaWxsPSIjNUIzQTJGIi8+PHBhdGggZD0iTTcwIDg1SDU1VjY1YzAtNS01LTEwLTEwLTEwaC01VjUwaDEwdjIwaDEwdjE1eiIgZmlsbD0iIzMzMyIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iMTIiIHI9IjIiIGZpbGw9IndoaXRlIi8+PGNpcmNsZSBjeD0iNjAiIGN5PSIxNSIgcj0iMiIgZmlsbD0id2hpdGUiLz48Y2lyY2xlIGN4PSI0MCIgY3k9IjE1IiByPSIyIiBmaWxsPSJ3aGl0ZSIvPjxjaXJjbGUgY3g9IjY1IiBjeT0iMjUiIHI9IjIiIGZpbGw9IndoaXRlIi8+PGNpcmNsZSBjeD0iMzUiIGN5PSIyNSIgcj0iMiIgZmlsbD0id2hpdGUiLz48L3N2Zz4=";

        loader.load(emblemData, (tex) => {
            const faceGeo = new THREE.CircleGeometry(1.6, 64);
            const faceMat = new THREE.MeshStandardMaterial({ map: tex, transparent: true });
            const front = new THREE.Mesh(faceGeo, faceMat);
            front.position.z = 0.13;
            trophy.add(front);
        });

        // BACK SIDE
        const backCanvas = document.createElement('canvas');
        const bCtx = backCanvas.getContext('2d');
        backCanvas.width = 512; backCanvas.height = 512;
        bCtx.fillStyle = "#f0f0f2"; bCtx.fillRect(0,0,512,512);
        bCtx.font = "bold 80px 'Plus Jakarta Sans'";
        bCtx.fillStyle = "#ff3b30"; bCtx.textAlign = "center"; bCtx.textBaseline = "middle";
        bCtx.fillText("FOREVER", 256, 256);

        const backTex = new THREE.CanvasTexture(backCanvas);
        const backFace = new THREE.Mesh(new THREE.CircleGeometry(1.6, 64), new THREE.MeshStandardMaterial({ map: backTex }));
        backFace.position.z = -0.13;
        backFace.rotation.y = Math.PI;
        trophy.add(backFace);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;
        controls.addEventListener('start', () => hint.style.opacity = '0');

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
