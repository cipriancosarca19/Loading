<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid pentru începători</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1d1d1f;
            --accent-red: #d32f2f;
            --medal-color: #f5f5f7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .header-text {
            margin-top: 40px;
            font-size: 18px;
            color: #86868b;
            font-weight: 500;
        }

        h1 {
            font-size: 32px;
            margin: 10px 0;
            font-weight: 700;
        }

        /* 3D Canvas Container */
        #canvas-container {
            width: 100%;
            height: 400px;
            cursor: grab;
            touch-action: none;
        }
        #canvas-container:active { cursor: grabbing; }

        .subtitle {
            font-size: 16px;
            color: var(--accent-red);
            font-weight: 600;
            margin-bottom: 40px;
        }

        /* Collection Section */
        .collection {
            width: 90%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            border-top: 1px solid #e5e5e5;
        }

        .emblem-locked {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.2;
        }

        .circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #f5f5f7;
            border: 2px solid #d2d2d7;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <p class="header-text">Ai câștigat:</p>
    <h1>Madrid pentru începători</h1>
    
    <div id="canvas-container"></div>

    <p class="subtitle">Colecționează-le pe toate!</p>

    <div class="collection">
        <div class="emblem-locked"><div class="circle"></div></div>
        <div class="emblem-locked"><div class="circle"></div></div>
        <div class="emblem-locked"><div class="circle"></div></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // Create the Medal (a thick cylinder)
        const geometry = new THREE.CylinderGeometry(1.5, 1.5, 0.2, 64);
        
        // Materials
        const silverMat = new THREE.MeshStandardMaterial({ 
            color: 0xe0e0e2, 
            metalness: 0.7, 
            roughness: 0.2 
        });

        const medal = new THREE.Mesh(geometry, silverMat);
        medal.rotation.x = Math.PI / 2;
        scene.add(medal);

        // Add Front Image (Madrid Bear/Tree)
        const loader = new THREE.TextureLoader();
        // Using a drawing-style placeholder for the Madrid icon
        const frontTexture = loader.load('https://i.imgur.com/8N69V3O.png'); 
        const frontGeo = new THREE.CircleGeometry(1.4, 32);
        const frontMat = new THREE.MeshBasicMaterial({ map: frontTexture, transparent: true });
        const frontSide = new THREE.Mesh(frontGeo, frontMat);
        frontSide.position.y = 0.101; 
        frontSide.rotation.x = -Math.PI / 2;
        medal.add(frontSide);

        // Add Back Text "FOREVER"
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512;
        canvas.height = 512;
        ctx.fillStyle = "white";
        ctx.fillRect(0,0,512,512);
        ctx.fillStyle = "#333";
        ctx.font = "Bold 80px Arial";
        ctx.textAlign = "center";
        ctx.fillText("FOREVER", 256, 256);
        
        const backTexture = new THREE.CanvasTexture(canvas);
        const backGeo = new THREE.CircleGeometry(1.4, 32);
        const backMat = new THREE.MeshBasicMaterial({ map: backTexture });
        const backSide = new THREE.Mesh(backGeo, backMat);
        backSide.position.y = -0.101;
        backSide.rotation.x = Math.PI / 2;
        backSide.rotation.z = Math.PI; // Flip so text reads correctly
        medal.add(backSide);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    </script>
</body>
</html>
