<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Trophy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --accent: #ff3b30;
            --silver-metal: #efeff4;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --border: #e5e5e7;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Styling */
        .header { text-align: center; margin-top: 50px; padding: 0 20px; }
        .header p { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #86868b; margin-bottom: 5px; }
        h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; line-height: 1.1; }

        /* 3D Container */
        #canvas-container {
            width: 100%;
            height: 450px;
            cursor: grab;
            position: relative;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #a1a1a6;
            background: rgba(245, 245, 247, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
        }

        .subtitle { font-size: 18px; color: var(--accent); font-weight: 700; margin-top: 10px; }

        /* Collection Section */
        .collection-card {
            width: 88%;
            max-width: 420px;
            background: #fbfbfd;
            border-radius: 30px;
            padding: 25px;
            margin-top: 30px;
            margin-bottom: 60px;
            border: 1px solid #efeff4;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .collection-card h3 { font-size: 11px; color: #a1a1a6; letter-spacing: 1.5px; margin-bottom: 25px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .circle-slot { width: 100%; aspect-ratio: 1; border-radius: 24px; background: #f2f2f7; border: 1.5px solid #e5e5ea; display: flex; align-items: center; justify-content: center; opacity: 0.4; font-size: 24px; }
    </style>
</head>
<body>

    <div class="header">
        <p>Ai câștigat:</p>
        <h1>Madrid pentru începători</h1>
    </div>
    
    <div id="canvas-container">
        <div id="hint">Atinge pentru a roti 3D</div>
    </div>

    <p class="subtitle">Colecționează-le pe toate!</p>

    <div class="collection-card">
        <h3>URMĂTOARELE OBIECTIVE</h3>
        <div class="grid">
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(38, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 5.5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // --- THE TROPHY MODEL ---
        const trophy = new THREE.Group();
        scene.add(trophy);

        // Professional PBR Lighting
        const amb = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(amb);
        const dir = new THREE.DirectionalLight(0xffffff, 1);
        dir.position.set(5, 5, 5);
        scene.add(dir);
        const rim = new THREE.PointLight(0xffffff, 0.5);
        rim.position.set(-5, -2, -5);
        scene.add(rim);

        // 1. The Coin Body (Realistic PBR Metal)
        const bodyGeo = new THREE.CylinderGeometry(1.8, 1.8, 0.3, 64);
        const metalMat = new THREE.MeshStandardMaterial({ 
            color: 0xefeff4, // Silver/Platinum Tone
            metalness: 0.9, 
            roughness: 0.15 
        });
        const body = new THREE.Mesh(bodyGeo, metalMat);
        body.rotation.x = Math.PI / 2;
        trophy.add(body);

        // 2. Front Face: High-Quality Madrid Emblem
        const loader = new THREE.TextureLoader();
        // High quality Madrid Emblem (Bear & Tree)
        const emblemUrl = "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Escudo_de_Madrid.svg/512px-Escudo_de_Madrid.svg.png";
        
        loader.load(emblemUrl, (tex) => {
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            const faceGeo = new THREE.CircleGeometry(1.75, 64);
            const faceMat = new THREE.MeshStandardMaterial({ 
                map: tex, 
                transparent: true,
                metalness: 0.2,
                roughness: 0.5
            });
            const front = new THREE.Mesh(faceGeo, faceMat);
            front.position.z = 0.151; // Raise slightly above coin
            trophy.add(front);
        });

        // 3. Back Side: FOREVER (Styled to look like it's engraved)
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1024; canvas.height = 1024;
        
        // Background color of the back face to match the silver body
        ctx.fillStyle = "#efeff4"; 
        ctx.fillRect(0,0,1024,1024);
        
        // Engraved Look Text Styling
        ctx.font = "800 100px 'Plus Jakarta Sans'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        // Create an engraved depth shadow
        ctx.fillStyle = "rgba(0,0,0,0.3)"; 
        ctx.fillText("FOREVER", 516, 516);
        // Clean up the edge for high fidelity
        ctx.fillStyle = "#1d1d1f"; 
        ctx.fillText("FOREVER", 512, 512);

        const backTex = new THREE.CanvasTexture(canvas);
        const backFace = new THREE.Mesh(
            new THREE.CircleGeometry(1.75, 64), 
            new THREE.MeshStandardMaterial({ map: backTex, metalness: 0.5 })
        );
        backFace.position.z = -0.151;
        backFace.rotation.y = Math.PI;
        trophy.add(backFace);

        // Orbit Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false; // Disable zoom to maintain proportions
        controls.autoRotate = false; // Keep it still until touched

        // Hint handling
        const hint = document.getElementById('hint');
        controls.addEventListener('start', () => {
            hint.style.opacity = '0';
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
