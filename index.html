<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Trophy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --accent: #ff3b30;
            --silver: linear-gradient(135deg, #f5f5f7 0%, #d2d2d7 50%, #8e8e93 100%);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header { text-align: center; margin-top: 60px; padding: 0 20px; }
        .header p { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #86868b; margin-bottom: 8px; }
        h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -1.5px; line-height: 1.1; }

        /* The Medal */
        .medal-wrapper {
            margin: 50px 0;
            perspective: 1000px;
        }

        .medal {
            width: 280px;
            height: 280px;
            position: relative;
            border-radius: 50%;
            background: var(--silver);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.15),
                inset 0 -10px 20px rgba(0,0,0,0.1),
                inset 0 10px 20px rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #ffffff;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Glass Shine Effect */
        .medal::after {
            content: '';
            position: absolute;
            top: 5%; left: 5%; width: 90%; height: 90%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Embedded Madrid Emblem */
        .medal img {
            width: 65%;
            height: 65%;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            z-index: 2;
        }

        .subtitle { 
            font-size: 19px; 
            color: var(--accent); 
            font-weight: 700; 
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        /* Modern Objectives Grid */
        .collection-card {
            width: 90%;
            max-width: 420px;
            background: #fbfbfd;
            border-radius: 32px;
            padding: 30px;
            border: 1px solid #efeff4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 40px;
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .slot { 
            aspect-ratio: 1; 
            background: #f2f2f7; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1.5px solid #e5e5ea;
            opacity: 0.4;
            font-size: 24px;
        }

        /* Interaction */
        .medal:active { transform: scale(0.95) rotateY(15deg); }
    </style>
</head>
<body>

    <div class="header">
        <p>Ai câștigat:</p>
        <h1>Madrid pentru începători</h1>
    </div>
    
    <div class="medal-wrapper">
        <div class="medal">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Escudo_de_Madrid.svg/512px-Escudo_de_Madrid.svg.png" alt="Madrid">
        </div>
    </div>

    <p class="subtitle">Colecționează-le pe toate!</p>

    <div class="collection-card">
        <div class="grid">
            <div class="slot">🔒</div>
            <div class="slot">🔒</div>
            <div class="slot">🔒</div>
        </div>
    </div>

</body>
</html>
