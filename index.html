<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid Award</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #ffffff; color: #1d1d1f; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }
        .header { text-align: center; margin-top: 50px; }
        .header p { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #86868b; margin-bottom: 5px; }
        h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        #canvas-container { width: 100%; height: 400px; cursor: grab; display: flex; justify-content: center; align-items: center; }
        .subtitle { font-size: 18px; color: #ff3b30; font-weight: 700; margin: 15px 0; }
        .collection-card { width: 90%; max-width: 400px; background: #fbfbfd; border-radius: 28px; padding: 25px; border: 1px solid #efeff4; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .circle-slot { width: 100%; aspect-ratio: 1; border-radius: 20px; background: #f2f2f7; border: 1px solid #e5e5ea; display: flex; align-items: center; justify-content: center; opacity: 0.3; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <p>Ai câștigat:</p>
        <h1>Madrid pentru începători</h1>
    </div>
    <div id="canvas-container"></div>
    <p class="subtitle">Colecționează-le pe toate!</p>
    <div class="collection-card">
        <div class="grid">
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
            <div class="circle-slot">🔒</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        const trophy = new THREE.Group();
        scene.add(trophy);

        // 3D Silver Medal Body
        const bodyGeo = new THREE.CylinderGeometry(1.6, 1.6, 0.25, 64);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe5e5e7, metalness: 0.9, roughness: 0.1 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.x = Math.PI / 2;
        trophy.add(body);

        // MADRID LOGO (Embedded as a data string so it ALWAYS works)
        const loader = new THREE.TextureLoader();
        const logoData = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZyBmaWxsPSJub25lIiBzdHJva2U9IiMzMzMiIHN0cm9rZS13aWR0aD0iMiI+PHBhdGggZD0iTTUwIDIwYzUgMCA5IDQgOSAxMHMtNCAxMC05IDEwLTktNC05LTEwIDQtMTAgOS0xMHoiLz48cGF0aCBkPSJNNDggMzB2NDBoNFYzMEg0OHoiLz48cGF0aCBkPSJNNjAgNzBINTB2LTE1YzAtMy0yLTYtNS02aC0zdjE1aC01di0yMGgxMHYxNWg4djE1eiIvPjwvZz48L3N2Zz4=";
        
        loader.load(logoData, (tex) => {
            const faceGeo = new THREE.CircleGeometry(1.4, 64);
            const faceMat = new THREE.MeshStandardMaterial({ map: tex, transparent: true });
            const front = new THREE.Mesh(faceGeo, faceMat);
            front.position.z = 0.13;
            trophy.add(front);
        });

        // Engraved Back
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 512;
        ctx.fillStyle = "#e5e5e7"; ctx.fillRect(0,0,512,512);
        ctx.font = "bold 60px sans-serif"; ctx.fillStyle = "#333"; ctx.textAlign = "center";
        ctx.fillText("FOREVER", 256, 260);
        const back = new THREE.Mesh(new THREE.CircleGeometry(1.6, 64), new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(canvas) }));
        back.position.z = -0.13; back.rotation.y = Math.PI;
        trophy.add(back);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
