<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrid pentru începători</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #ff4b2b;
            --medal-gold: #d4af37;
            --card-bg: #1c1c1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* Award Container */
        .award-container {
            text-align: center;
            margin-top: 50px;
            animation: fadeIn 1.2s ease-out;
        }

        /* Medal Styling */
        .medal-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            background: linear-gradient(145deg, #2c2c2e, #000000);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Madrid Logo SVG (Bear and Tree) */
        .madrid-logo {
            width: 140px;
            height: 140px;
            fill: #ff6b6b; /* Vibrant color like the image */
            filter: drop-shadow(0 0 10px rgba(255,107,107,0.4));
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 10px 0 5px;
        }

        .subtitle {
            color: #8e8e93;
            font-size: 16px;
            margin-bottom: 40px;
        }

        /* Collection Section */
        .collection-section {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
            border-top: 1px solid #38383a;
            padding-top: 20px;
        }

        .collection-title {
            font-size: 14px;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: block;
        }

        .emblem-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .emblem-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.3; /* Locked state */
            filter: grayscale(1);
        }

        .emblem-circle {
            width: 60px;
            height: 60px;
            background: #2c2c2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            border: 2px dashed #48484a;
        }

        .emblem-name {
            font-size: 10px;
            color: #8e8e93;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bottom Nav (Aesthetics) */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 350px;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
        }

        .nav-item { color: #8e8e93; font-size: 12px; text-decoration: none; text-align: center; }
        .nav-item.active { color: #30d158; }
    </style>
</head>
<body>

    <div class="award-container">
        <div class="medal-wrapper">
            <svg class="madrid-logo" viewBox="0 0 100 100">
                <path d="M50 20 Q65 20 65 35 Q65 50 50 50 Q35 50 35 35 Q35 20 50 20" />
                <rect x="47" y="45" width="6" height="30" />
                <path d="M30 75 Q25 75 25 65 L25 50 Q25 40 35 40 L45 40 L45 75 Z" />
                <circle cx="50" cy="10" r="2" fill="white" />
                <circle cx="70" cy="15" r="2" fill="white" />
                <circle cx="85" cy="30" r="2" fill="white" />
            </svg>
        </div>

        <h1>Madrid pentru începători</h1>
        <p class="subtitle">Colecționează-le pe toate!</p>
    </div>

    <div class="collection-section">
        <span class="collection-title">Următoarele Embleme</span>
        <div class="emblem-grid">
            <div class="emblem-item">
                <div class="emblem-circle">🔒</div>
                <div class="emblem-name">Retiro Explorer</div>
            </div>
            <div class="emblem-item">
                <div class="emblem-circle">🔒</div>
                <div class="emblem-name">Museo Expert</div>
            </div>
            <div class="emblem-item">
                <div class="emblem-circle">🔒</div>
                <div class="emblem-name">Tapas Master</div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">● Summary</div>
        <div class="nav-item">● Workout</div>
        <div class="nav-item">● Sharing</div>
    </div>

</body>
</html>
